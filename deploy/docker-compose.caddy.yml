services:
  caddy:
    image: caddy:2-alpine
    container_name: go-app-caddy
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"

    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile

    volumes:
      - caddy_data:/data
      - caddy_config:/config

    networks:
      - go-app-network

configs:
  caddyfile:
    file: ./Caddyfile

volumes:
  caddy_data:
  caddy_config:

networks:
  go-app-network:
    external: true
    name: go-app-network