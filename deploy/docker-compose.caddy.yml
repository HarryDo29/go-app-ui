services:
  caddy:
    image: caddy:2-alpine
    container_name: go-app-caddy
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

    networks:
      - go-app-network

volumes:
  caddy_data:
  caddy_config:

networks:
  go-app-network:
    external: true
    name: go-app-network