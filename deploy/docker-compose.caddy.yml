services:
  caddy:
    image: caddy:2-alpine
    container_name: go-app-caddy
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"

    entrypoint: ["/bin/sh", "-c"]

    command:
      - |
        cat > /tmp/Caddyfile <<'EOF'
        chat-app.website {
            redir https://www.chat-app.website{uri} permanent
        }

        www.chat-app.website {
            reverse_proxy go-app-frontend:80
        }

        api.chat-app.website {
            reverse_proxy go-app-backend:8080
        }

        minio.chat-app.website {
            reverse_proxy go-app-minio:9000
        }
        EOF

        exec caddy run \
          --config /tmp/Caddyfile \
          --adapter caddyfile

    volumes:
      - caddy_data:/data
      - caddy_config:/config

    networks:
      - go-app-network

volumes:
  caddy_data:
  caddy_config:

networks:
  go-app-network:
    external: true
    name: go-app-network